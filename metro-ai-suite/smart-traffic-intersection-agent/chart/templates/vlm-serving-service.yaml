apiVersion: v1
kind: Service
metadata:
  name: {{ include "stia.vlmServing.fullname" . }}
  labels:
    {{- include "stia.labels" . | nindent 4 }}
    app.kubernetes.io/component: vlm-serving
spec:
  type: {{ .Values.vlmServing.service.type }}
  ports:
    - name: http
      port: {{ .Values.vlmServing.service.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    app: {{ include "stia.vlmServing.fullname" . }}
