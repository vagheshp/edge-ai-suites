apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stia.vlmServing.fullname" . }}
  labels:
    {{- include "stia.labels" . | nindent 4 }}
    app.kubernetes.io/component: vlm-serving
spec:
  replicas: {{ .Values.vlmServing.replicas }}
  selector:
    matchLabels:
      app: {{ include "stia.vlmServing.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "stia.vlmServing.fullname" . }}
        {{- include "stia.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vlm-serving
    spec:
      {{- if .Values.vlmServing.gpu.enabled }}
      securityContext:
        supplementalGroups:
          {{- toYaml .Values.vlmServing.gpu.renderGroupIds | nindent 10 }}
      {{- end }}
      {{- with .Values.vlmServing.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Values.vlmServing.name }}
          image: "{{ .Values.vlmServing.image.repository }}:{{ .Values.vlmServing.image.tag }}"
          imagePullPolicy: {{ .Values.vlmServing.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: no_proxy
              value: "{{ .Values.global.proxy.noProxy }},.svc,.svc.cluster.local,.cluster.local,{{ include "stia.vlmServing.fullname" . }},{{ include "stia.trafficAgent.fullname" . }}"
            - name: http_proxy
              value: {{ .Values.global.proxy.httpProxy | quote }}
            - name: https_proxy
              value: {{ .Values.global.proxy.httpsProxy | quote }}
            - name: VLM_MODEL_NAME
              value: {{ .Values.vlmServing.env.modelName | quote }}
            - name: VLM_COMPRESSION_WEIGHT_FORMAT
              value: {{ .Values.vlmServing.env.compressionWeightFormat | quote }}
            # Auto-derive device from gpu.enabled; override with vlmServing.env.device when GPU is off
            - name: VLM_DEVICE
              value: {{ if .Values.vlmServing.gpu.enabled }}"GPU"{{ else }}{{ .Values.vlmServing.env.device | quote }}{{ end }}
            - name: VLM_SEED
              value: {{ .Values.vlmServing.env.seed | quote }}
            # Force single worker when GPU is enabled (GPU inference is not multi-process safe)
            - name: WORKERS
              value: {{ if .Values.vlmServing.gpu.enabled }}"1"{{ else }}{{ .Values.vlmServing.env.workers | quote }}{{ end }}
            - name: VLM_MAX_COMPLETION_TOKENS
              value: {{ .Values.vlmServing.env.maxCompletionTokens | quote }}
            - name: VLM_LOG_LEVEL
              value: {{ .Values.vlmServing.env.logLevel | quote }}
            - name: OPENVINO_LOG_LEVEL
              value: {{ .Values.vlmServing.env.openvinoLogLevel | quote }}
            - name: VLM_ACCESS_LOG_FILE
              value: {{ .Values.vlmServing.env.accessLogFile | quote }}
            {{- if .Values.vlmServing.gpu.enabled }}
            {{- if .Values.vlmServing.env.ovConfigGpu }}
            - name: OV_CONFIG
              value: {{ .Values.vlmServing.env.ovConfigGpu | quote }}
            {{- end }}
            {{- else }}
            {{- if .Values.vlmServing.env.ovConfigCpu }}
            - name: OV_CONFIG
              value: {{ .Values.vlmServing.env.ovConfigCpu | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.vlmServing.huggingfaceToken }}
            - name: HUGGINGFACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "stia.fullname" . }}-hf-token
                  key: token
            {{- end }}
          volumeMounts:
            - name: ov-models
              mountPath: /root/.cache/huggingface
            - name: ov-models
              mountPath: /app/ov-model
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.vlmServing.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.vlmServing.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.vlmServing.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.vlmServing.healthcheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.vlmServing.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.vlmServing.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.vlmServing.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.vlmServing.healthcheck.failureThreshold }}
          resources:
            {{- if .Values.vlmServing.gpu.enabled }}
            {{- $res := deepCopy .Values.vlmServing.resources }}
            {{- $gpuLimits := dict .Values.vlmServing.gpu.resourceName (.Values.vlmServing.gpu.resourceLimit | int) }}
            {{- $_ := set $res "limits" (merge (default dict (get $res "limits")) $gpuLimits) }}
            {{- toYaml $res | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.vlmServing.resources | nindent 12 }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: ov-models
          {{- if .Values.vlmServing.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "stia.vlmServing.fullname" . }}-models
          {{- else }}
          emptyDir: {}
          {{- end }}
