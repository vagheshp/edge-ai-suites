apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "live-metrics-service.fullname" . }}
  labels:
    {{- include "live-metrics-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: live-metrics-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "live-metrics-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "live-metrics-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: live-metrics-service
    spec:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - traffic-agent
              topologyKey: kubernetes.io/hostname
      containers:
        - name: live-metrics-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: METRICS_PORT
              value: {{ .Values.env.metricsPort | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.env.corsOrigins | quote }}
            {{- include "live-metrics-service.proxyEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds }}
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
