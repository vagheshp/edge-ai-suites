secrets:
  root-cert:
    file: ${RI_DIR}/src/secrets/certs/scenescape-ca.pem

services:
  vlm-openvino-serving:
    image: intel/vlm-openvino-serving:1.3.2
    ports:
      - "8000"
    ipc: host
    networks:
      - scenescape
    environment:
      # Proxy settings
      no_proxy_env: ${no_proxy:-${NO_PROXY:-}},${HOST_IP}
      no_proxy: ${no_proxy:-${NO_PROXY:-}},${HOST_IP}
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      # VLM Model configuration
      VLM_MODEL_NAME: ${VLM_MODEL_NAME}
      VLM_COMPRESSION_WEIGHT_FORMAT: ${VLM_COMPRESSION_WEIGHT_FORMAT:-int4}
      VLM_DEVICE: ${VLM_DEVICE:-CPU}
      VLM_SEED: ${VLM_SEED:-42}
      WORKERS: ${VLM_WORKERS:-1}
      VLM_MAX_COMPLETION_TOKENS: ${VLM_MAX_COMPLETION_TOKENS:-1500}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      OV_CONFIG: ${OV_CONFIG:-}
      VLM_LOG_LEVEL: ${VLM_LOG_LEVEL:-info}
      OPENVINO_LOG_LEVEL: ${VLM_OPENVINO_LOG_LEVEL:-1}
      VLM_ACCESS_LOG_FILE: ${VLM_ACCESS_LOG_FILE:-/dev/null}
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - ${USER_GROUP_ID:-1000} 
      - ${VIDEO_GROUP_ID:-44}    
      - ${RENDER_GROUP_ID:-109} 
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 10s
    volumes:
      - ov-models:/root/.cache/huggingface
      - ov-models:/app/ov-model

  traffic-agent:
    build:
      context: ${APP_DIR:-..}/src
      dockerfile: Dockerfile
    image: ${REGISTRY:-}smart-traffic-intersection-agent:${TAG:-latest}
    ports:
      - "${AGENT_BACKEND_PORT:-}:8081"
      - "${AGENT_UI_PORT:-}:7860"
    networks:
      - scenescape
    depends_on:
      vlm-openvino-serving:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      USE_API: "true"
      REFRESH_INTERVAL: ${REFRESH_INTERVAL:-15}
      
      # Proxy settings
      http_proxy: ${http_proxy}
      HTTP_PROXY: ${http_proxy}
      https_proxy: ${https_proxy}
      HTTPS_PROXY: ${https_proxy}
      no_proxy: ${no_proxy:-${NO_PROXY:-}},.scenescape.intel.com,${HOST_IP},broker.scenescape.intel.com,vlm-openvino-serving,live-metrics-service
      NO_PROXY: ${no_proxy:-${NO_PROXY:-}},.scenescape.intel.com,${HOST_IP},broker.scenescape.intel.com,vlm-openvino-serving,live-metrics-service
      
      # MQTT configuration (connects to broker service)
      MQTT_HOST: ${MQTT_HOST:-broker.scenescape.intel.com}
      MQTT_PORT: ${MQTT_PORT:-1883}

      # Intersection configuration (overrides src/config/deployment_instance.json)
      INTERSECTION_NAME: ${INTERSECTION_NAME:-}
      INTERSECTION_LATITUDE: ${INTERSECTION_LATITUDE:-}
      INTERSECTION_LONGITUDE: ${INTERSECTION_LONGITUDE:-}
      
      # Weather configuration (overrides src/config/traffic_agent.json)
      WEATHER_MOCK: ${WEATHER_MOCK:-false}
      
      # VLM configuration (overrides src/config/traffic_agent.json)
      VLM_MODEL_NAME: ${VLM_MODEL_NAME}
      VLM_TIMEOUT_SECONDS: ${VLM_TIMEOUT_SECONDS:-}
      VLM_MAX_COMPLETION_TOKENS: ${VLM_MAX_COMPLETION_TOKENS:-}
      VLM_TEMPERATURE: ${VLM_TEMPERATURE:-}
      VLM_TOP_P: ${VLM_TOP_P:-}
      
      # Traffic analysis configuration (overrides src/config/traffic_agent.json)
      HIGH_DENSITY_THRESHOLD: ${HIGH_DENSITY_THRESHOLD:-10}
      MODERATE_DENSITY_THRESHOLD: ${MODERATE_DENSITY_THRESHOLD:-}
      TRAFFIC_BUFFER_DURATION: ${TRAFFIC_BUFFER_DURATION:-}

      # Live metrics WebSocket URL (internal, proxied through traffic-agent)
      METRICS_WS_URL: ws://live-metrics-service:9090/ws/clients

    volumes:
      - ${APP_DIR:-..}/src/config:/app/config:ro
      - traffic-agent-data:/app/data
    secrets:
      - source: root-cert
        target: /app/secrets/certs/scenescape-ca.pem
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: ${HEALTH_CHECK_INTERVAL:-30s}
      timeout: ${HEALTH_CHECK_TIMEOUT:-10s}
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: ${HEALTH_CHECK_START_PERIOD:-10s}
    restart: unless-stopped

  # Live System Metrics - relay service
  live-metrics-service:
    image: ${REGISTRY:-}live-metrics-service:${TAG:-latest}
    build:
      context: ${APP_DIR:-..}/../live-video-analysis/live-metrics-service
    environment:
      - METRICS_PORT=9090
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - no_proxy=localhost,127.0.0.1,collector,${no_proxy}
    ports:
      - "9090"
    networks:
      - scenescape
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Live System Metrics - collector (Telegraf)
  collector:
    image: docker.io/intel/vippet-collector:2026.0.0
    ports:
      - "9273"
    privileged: true
    devices:
      - "/sys:/sys"
      - "/dev:/dev"
      - "/run:/run"
      - "/proc:/proc"
    pid: host
    volumes:
      - "${APP_DIR:-..}/../live-video-analysis/live-metrics-service/telegraf.conf:/etc/telegraf/telegraf.conf:ro"
      - "${APP_DIR:-..}/../live-video-analysis/live-metrics-service/collector-signals:/app/.collector-signals"
    environment:
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - no_proxy=localhost,127.0.0.1,live-metrics-service,${no_proxy}
      - WEBSOCKET_URL=ws://live-metrics-service:9090/ws/collector
    depends_on:
      live-metrics-service:
        condition: service_healthy
    networks:
      - scenescape
    restart: unless-stopped

  # Override RI nginx to avoid hardcoded container_name conflict in multi-instance deployments
  nginx:
    container_name: ${INTERSECTION_NAME:-trafficagent}-nginx-reverse-proxy

volumes:
  ov-models:
  traffic-agent-data:

networks:
  scenescape:
