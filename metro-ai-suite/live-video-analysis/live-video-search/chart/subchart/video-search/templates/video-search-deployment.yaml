apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-search
  labels:
    {{- include "lvs.videosearch.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: video-search
  template:
    metadata:
      labels:
        app: video-search
        {{- include "lvs.videosearch.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z vdms-vector-db 55555; do
                echo "waiting for vdms-vector-db:55555";
                sleep 3;
              done
              until wget -q -O /dev/null http://minio-service/minio/health/live; do
                echo "waiting for minio-service";
                sleep 3;
              done
              until wget -q -O /dev/null http://vdms-dataprep:8000/v1/dataprep/health; do
                echo "waiting for vdms-dataprep";
                sleep 3;
              done
              until wget -q -O /dev/null http://multimodal-embedding-serving:8000/health; do
                echo "waiting for multimodal-embedding-serving";
                sleep 3;
              done
      containers:
        - name: video-search
          image: {{ include "lvs.videosearch.image" (dict "registry" (default .Values.global.registry .Values.imageOverride.registry) "repository" (default .Values.images.videoSearch.repository .Values.imageOverride.repository) "tag" (default (include "lvs.videosearch.vssTag" .) .Values.imageOverride.tag)) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: video-search-config
          ports:
            - containerPort: 8000
              name: http
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
