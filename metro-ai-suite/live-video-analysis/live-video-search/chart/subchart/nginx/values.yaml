global:
  proxy:
    httpProxy: ''
    httpsProxy: ''
    noProxy: localhost,127.0.0.1,.svc.cluster.local

replicaCount: 1

imagePullPolicy: IfNotPresent

podSecurityContext: {}

securityContext:
    allowPrivilegeEscalation: false
    seccompProfile:
        type: RuntimeDefault

resources: {}

livenessProbe:
    httpGet:
        path: /
        port: http
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6

readinessProbe:
    httpGet:
        path: /
        port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

startupProbe:
    httpGet:
        path: /
        port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60

images:
  nginx: nginx:1.27.5

service:
  app:
    type: NodePort
    port: 80
    nodePort: 31245

nginx:
  config: |
    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        server {
            listen 80;
            listen [::]:80;
            client_max_body_size 500M;
            proxy_read_timeout 1800s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 1800s;
            send_timeout 1800s;
            keepalive_timeout 1800s;

            location / {
                proxy_pass "http://${APP_UI}/";
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "Upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
            }

            location /ws/ {
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Host $host;
                proxy_pass "http://${APP_MANAGER}/ws/";
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
            }

            location /manager/ {
                proxy_pass "http://${APP_MANAGER}/";
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "Upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
            }

            location /manager/metrics/ws/ {
                proxy_pass "http://${APP_MANAGER}/metrics/ws/";
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_read_timeout 3600s;
            }

            location /datastore/ {
                proxy_pass "http://${APP_ASSETS}/";
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "Upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
            }

            location /nvr-api/ {
                rewrite ^/nvr-api(/.*)$ $1 break;
                proxy_pass "http://nvr-event-router:8000";
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "Upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache_bypass $http_upgrade;
            }
        }
    }
