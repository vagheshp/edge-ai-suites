apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    {{- include "lvs.nginx.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        {{- include "lvs.nginx.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-upstreams
          image: busybox:1.36
          env:
            - name: http_proxy
              value: {{ .Values.global.proxy.httpProxy | quote }}
            - name: https_proxy
              value: {{ .Values.global.proxy.httpsProxy | quote }}
            - name: HTTP_PROXY
              value: {{ .Values.global.proxy.httpProxy | quote }}
            - name: HTTPS_PROXY
              value: {{ .Values.global.proxy.httpsProxy | quote }}
            - name: no_proxy
              value: "{{ .Values.global.proxy.noProxy }},minio-service,minio-service.default.svc,minio-service.svc,vss-ui,vss-ui.default.svc,vss-ui.svc,pipeline-manager,pipeline-manager.default.svc,pipeline-manager.svc,nvr-event-router,nvr-event-router.default.svc,nvr-event-router.svc,localhost"
            - name: NO_PROXY
              value: "{{ .Values.global.proxy.noProxy }},minio-service,minio-service.default.svc,minio-service.svc,vss-ui,vss-ui.default.svc,vss-ui.svc,pipeline-manager,pipeline-manager.default.svc,pipeline-manager.svc,nvr-event-router,nvr-event-router.default.svc,nvr-event-router.svc,localhost"
          command:
            - sh
            - -c
            - |
              until wget -Y off -q -O /dev/null http://vss-ui:8080; do
                echo "waiting for vss-ui";
                sleep 3;
              done
              until wget -Y off -q -O /dev/null http://pipeline-manager:3000/health; do
                echo "waiting for pipeline-manager";
                sleep 3;
              done
              until wget -Y off -q -O /dev/null http://minio-service/minio/health/live; do
                echo "waiting for minio-service";
                sleep 3;
              done
              until wget -Y off -q -O /dev/null http://nvr-event-router:8000/health; do
                echo "waiting for nvr-event-router";
                sleep 3;
              done
      containers:
        - name: nginx
          image: {{ .Values.images.nginx }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: APP_UI
              value: "vss-ui:8080"
            - name: APP_MANAGER
              value: "pipeline-manager:3000"
            - name: APP_ASSETS
              value: "minio-service"
            - name: NGINX_ENVSUBST_TEMPLATE_DIR
              value: "/etc/nginx/templates"
            - name: NGINX_ENVSUBST_OUTPUT_DIR
              value: "/etc/nginx"
            - name: http_proxy
              value: {{ .Values.global.proxy.httpProxy | quote }}
            - name: https_proxy
              value: {{ .Values.global.proxy.httpsProxy | quote }}
            - name: no_proxy
              value: "{{ .Values.global.proxy.noProxy }},minio-service,vss-ui,pipeline-manager,nvr-event-router,localhost"
          ports:
            - containerPort: 80
              name: http
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates/nginx.conf.template
              subPath: nginx.conf.template
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "lvs.nginx.fullname" . }}-nginx
