apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    {{- include "lvs.nginx.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.app.type }}
  ports:
    - port: {{ .Values.service.app.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.service.app.type "NodePort") .Values.service.app.nodePort }}
      nodePort: {{ .Values.service.app.nodePort }}
      {{- end }}
  selector:
    app: nginx
