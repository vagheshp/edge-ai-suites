apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvr-event-router
  labels:
    {{- include "lvs.nvrrouter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nvr-event-router
  template:
    metadata:
      labels:
        app: nvr-event-router
        {{- include "lvs.nvrrouter.selectorLabels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      {{- if not .Values.global.persistence.rwxEnabled }}
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - frigate-vms
              topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O /dev/null http://frigate-vms:5000/; do
                echo "waiting for frigate-vms";
                sleep 3;
              done
              until nc -z mqtt-broker 1883; do
                echo "waiting for mqtt-broker:1883";
                sleep 3;
              done
              until nc -z redis 6379; do
                echo "waiting for redis:6379";
                sleep 3;
              done
              until wget -q -O /dev/null http://video-search:8000/health; do
                echo "waiting for video-search";
                sleep 3;
              done
      containers:
        - name: nvr-event-router
          image: {{ include "lvs.nvrrouter.image" (dict "registry" (default .Values.global.registry .Values.imageOverride.registry) "repository" (default .Values.images.nvrEventRouter.repository .Values.imageOverride.repository) "tag" (default (include "lvs.nvrrouter.smartNvrTag" .) .Values.imageOverride.tag)) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: nvr-event-router-config
          env:
            - name: REDIS_PORT
              value: "6379"
            - name: MQTT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "lvs.nvrrouter.fullname" . }}-credentials
                  key: MQTT_USER
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lvs.nvrrouter.fullname" . }}-credentials
                  key: MQTT_PASSWORD
          ports:
            - containerPort: 8000
              name: http
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: frigate-recordings
              mountPath: /media/frigate/recordings
      volumes:
        - name: frigate-recordings
          persistentVolumeClaim:
            claimName: {{ include "lvs.nvrrouter.fullname" . }}-frigate-recordings
