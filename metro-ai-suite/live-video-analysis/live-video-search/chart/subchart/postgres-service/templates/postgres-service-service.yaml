apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    {{- include "lvs.postgres.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app: postgres-service
