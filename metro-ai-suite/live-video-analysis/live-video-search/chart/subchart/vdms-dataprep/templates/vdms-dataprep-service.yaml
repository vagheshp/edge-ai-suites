apiVersion: v1
kind: Service
metadata:
  name: vdms-dataprep
  labels:
    {{- include "lvs.dataprep.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: vdms-dataprep
