{{- $gpu := default (dict) .Values.global.gpu -}}
{{- $dataprepGpuEnabled := default false (index $gpu "vdmsDataprepEnabled") -}}
{{- $gpuHostPath := default "/dev/dri" (index $gpu "hostPath") -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vdms-dataprep
  labels:
    {{- include "lvs.dataprep.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: vdms-dataprep
  template:
    metadata:
      labels:
        app: vdms-dataprep
        {{- include "lvs.dataprep.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z vdms-vector-db 55555; do
                echo "waiting for vdms-vector-db:55555";
                sleep 3;
              done
              until wget -q -O /dev/null http://multimodal-embedding-serving:8000/health; do
                echo "waiting for multimodal-embedding-serving";
                sleep 3;
              done
              until wget -q -O /dev/null http://minio-service/minio/health/live; do
                echo "waiting for minio-service";
                sleep 3;
              done
      containers:
        - name: vdms-dataprep
          image: {{ include "lvs.dataprep.image" (dict "registry" (default .Values.global.registry .Values.imageOverride.registry) "repository" (default .Values.images.vdmsDataprep.repository .Values.imageOverride.repository) "tag" (default (include "lvs.dataprep.vssTag" .) .Values.imageOverride.tag)) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: vdms-dataprep-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lvs.dataprep.fullname" . }}-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lvs.dataprep.fullname" . }}-credentials
                  key: MINIO_ROOT_PASSWORD
          ports:
            - containerPort: 8000
              name: http
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $dataprepGpuEnabled }}
          resources:
            requests:
              {{ .Values.global.gpu.key }}: 1
            limits:
              {{ .Values.global.gpu.key }}: 1
          {{- else if .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: volume-data
              mountPath: /tmp/dataprep
              subPath: tmpvideos
            - name: volume-data
              mountPath: /home/appuser/.cache/huggingface
              subPath: huggingface
            {{- if .Values.modelPvc.enabled }}
            - name: models-data
              mountPath: {{ .Values.global.env.ovModelsDir }}
              subPath: ovmodels
            - name: models-data
              mountPath: /app/models/yolox
              subPath: yoloxmodels
            {{- else }}
            - name: volume-data
              mountPath: {{ .Values.global.env.ovModelsDir }}
              subPath: ovmodels
            - name: volume-data
              mountPath: /app/models/yolox
              subPath: yoloxmodels
            {{- end }}
            {{- if $dataprepGpuEnabled }}
            - name: dev-dri
              mountPath: /dev/dri
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.modelPvc.enabled }}
        - name: models-data
          {{- if .Values.modelPvc.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.modelPvc.existingClaim }}
          {{- else if .Values.global.usePvc }}
          persistentVolumeClaim:
            claimName: {{ include "lvs.dataprep.fullname" . }}-models-pvc
          {{- else if .Values.global.volumeHostPath }}
          hostPath:
            path: {{ .Values.global.volumeHostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        - name: volume-data
          {{- if .Values.global.usePvc }}
          persistentVolumeClaim:
            claimName: {{ .Values.global.sharedPvcName | default "lvs-pvc" }}
          {{- else if .Values.global.volumeHostPath }}
          hostPath:
            path: {{ .Values.global.volumeHostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if $dataprepGpuEnabled }}
        - name: dev-dri
          hostPath:
            path: {{ $gpuHostPath }}
            type: Directory
        {{- end }}
