apiVersion: v1
kind: Service
metadata:
  name: multimodal-embedding-serving
  labels:
    {{- include "lvs.mmes.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: multimodal-embedding-serving
